<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf7ec" />
  <title>📺 Rung chuông vàng - Màn chiếu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/style.css" />
  <!-- PWA: mở full màn hình khi thêm vào MH chính (iPhone/iPad + Android) -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Màn chiếu · RCV" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    body { display: block; padding: 0; align-items: stretch; justify-content: flex-start; }

    /* Màn nhập mã (khi mở trực tiếp không có ?code) */
    #enter { max-width: 460px; margin: 8vh auto; padding: 16px; }

    /* Màn chiếu */
    #stage { display: none; min-height: 100vh; padding: 2.2vw 2.6vw; }
    body.live #stage { display: block; }
    body.live #enter { display: none; }

    .vhead {
      display: flex; align-items: center;
      gap: 16px; margin-bottom: 1.6vw; flex-wrap: wrap; padding-right: 58px;
    }
    .vtitle { font-family: "Shantell Sans", sans-serif; font-weight: 700; font-size: clamp(30px, 4vw, 60px); color: var(--ink); }
    /* Đồng hồ thời gian đã trôi qua (ẩn tới khi ra hiệu) */
    .vtimer {
      display: none; font-family: "Shantell Sans", sans-serif; font-weight: 800;
      font-size: clamp(30px, 3.6vw, 58px); color: var(--ink); line-height: 1;
    }
    .vbanner { margin-left: auto; }   /* luôn đẩy banner về bên phải */
    .vbanner {
      font-family: "Shantell Sans", sans-serif; font-weight: 700; font-size: clamp(22px, 3vw, 44px);
      padding: 8px 24px; border-radius: 999px; white-space: nowrap;
    }
    .vbanner.wait { background: var(--blue-soft); color: var(--ink); }
    .vbanner.signal { background: var(--green); color: #073b23; animation: bpulse 1s ease-in-out infinite; }
    .vbanner.result { background: var(--gold); color: #6b4a06; }
    @keyframes bpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .grid {
      display: grid;
      /* rộng hơn để chứa đủ tên tối đa 20 ký tự */
      grid-template-columns: repeat(auto-fill, minmax(clamp(240px, 23vw, 360px), 1fr));
      /* giãn cách dọc lớn hơn giãn cách ngang */
      row-gap: clamp(26px, 3.2vw, 52px);
      column-gap: clamp(12px, 1.4vw, 24px);
    }

    /* ===== Layout ĐỀ BÀI: đề bên trái (lớn) + người chơi bên phải ===== */
    /* Mặc định (không có đề): ẩn phần đề, grid hiển thị như lưới đầy đủ */
    .qwrap { display: block; }
    .qleft, .qresizer { display: none; }

    /* Khi có đề: khung cao đúng 1 màn, chia 3 cột [đề | thanh kéo | người chơi] */
    #stage.qmode { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #stage.qmode .vhead { display: none; }              /* status đã chuyển vào vùng đề */
    #stage.qmode .qwrap {
      flex: 1 1 auto; min-height: 0;
      display: grid;
      max-height: 100%;
      grid-template-columns: var(--qsplit, 60%) 20px minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);   /* giới hạn chiều cao row -> đề dài thì .qpanel tự cuộn */
    }
    #stage.qmode .qleft { display: flex; flex-direction: column; min-height: 0; gap: clamp(10px, 1vw, 18px); }
    #stage.qmode .grid {
      overflow-y: auto; min-height: 0; align-content: start;
      grid-template-columns: repeat(auto-fill, minmax(clamp(150px, 12vw, 210px), 1fr));
      row-gap: clamp(18px, 2vw, 30px);
      /* chừa chỗ cho huy chương nhô ra ngoài card (top/left âm) khỏi bị overflow cắt */
      padding: 16px 6px 6px 12px;
      scrollbar-width: none;
    }
    #stage.qmode .grid::-webkit-scrollbar { width: 0; }

    /* Header vùng đề: status (chuyển vào) + dropdown cỡ chữ */
    .qhead { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .qhead .vbanner { margin-left: 0; }
    .qfont-select {
      margin-left: auto; font-family: "Shantell Sans", sans-serif; font-weight: 700;
      font-size: 16px; color: var(--ink); background: #fffdf7;
      border: 2px solid var(--line); border-radius: 12px; padding: 8px 12px; cursor: pointer;
    }

    /* Thanh kéo đổi kích thước (chỉ hiện ở layout đề) */
    .qresizer { display: none; cursor: col-resize; align-items: center; justify-content: center; touch-action: none; }
    #stage.qmode .qresizer { display: flex; align-self: stretch; }
    .qresizer::before {
      content: ""; width: 6px; height: clamp(48px, 20vh, 160px); border-radius: 999px;
      background: #cdd8e8; box-shadow: 0 2px 0 #b7c6dc;
    }
    .qresizer:hover::before { background: var(--blue); }

    /* Panel đề: giữ style card, cỡ chữ theo --qscale (dropdown chỉnh) */
    #stage.qmode .qpanel {
      flex: 1 1 auto; min-height: 0; overflow-y: auto;
      display: flex; flex-direction: column; gap: clamp(12px, 1.4vw, 22px);
      background: var(--paper); border: 3px solid var(--line); border-radius: 26px;
      box-shadow: 0 8px 0 #e2dac6; padding: clamp(18px, 2.2vw, 40px);
      scrollbar-width: none;
    }
    #stage.qmode .qpanel::-webkit-scrollbar { width: 0; }
    .qpanel { --qscale: 0.9; }
    .qpanel .qtext {
      font-family: "Shantell Sans", sans-serif; font-weight: 600; line-height: 1.28; color: var(--ink);
      font-size: calc(clamp(18px, 2.3vw, 44px) * var(--qscale));
    }
    /* Markdown trong nội dung đề */
    .qpanel .qtext.md p { margin: 0 0 .5em; }
    .qpanel .qtext.md p:last-child { margin-bottom: 0; }
    .qpanel .qtext.md ul, .qpanel .qtext.md ol { margin: .3em 0 .5em 1.3em; padding: 0; }
    .qpanel .qtext.md li { margin: .2em 0; }
    .qpanel .qtext.md h1, .qpanel .qtext.md h2, .qpanel .qtext.md h3 { margin: .1em 0 .35em; line-height: 1.2; }
    .qpanel .qtext.md blockquote {
      margin: .5em 0; padding: .55em 1em; line-height: 1.7;
      background: var(--blue-soft); color: var(--ink);
      border: 2px solid var(--blue);
      border-radius: 16px; box-shadow: 0 5px 0 var(--blue); font-style: italic;
    }
    .qpanel .qtext.md strong { font-weight: 800; }
    .qpanel .qtext.md em { font-style: italic; }
    .qpanel .qtext.md a { color: var(--blue); text-decoration: underline; }
    .qpanel .qtext.md code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .88em; background: var(--blue-soft); padding: .06em .35em; border-radius: 6px; }
    .qpanel .qtext.md pre { background: #f3efe2; border: 2px solid var(--line); border-radius: 12px; padding: .6em .8em; overflow-x: auto; margin: .4em 0; }
    .qpanel .qtext.md pre code { background: none; padding: 0; font-size: .8em; }
    .qpanel .qtext.md img { max-width: 100%; border-radius: 12px; }
    .qpanel .qimg {
      align-self: center; max-width: 100%; max-height: 42vh; object-fit: contain;
      border-radius: 16px; border: 2px solid var(--line); background: #fff;
    }
    .qpanel .qopts { list-style: none; display: grid; gap: clamp(8px, 1vw, 16px); }
    .qpanel .qopt {
      display: flex; align-items: center; gap: 12px;
      background: var(--blue-soft); border: 2px solid #bcd6f2; border-radius: 16px;
      box-shadow: 0 5px 0 #bcd6f2;
      padding: clamp(10px, 1vw, 18px) clamp(14px, 1.4vw, 24px);
      font-weight: 700; color: var(--ink);
      font-size: calc(clamp(15px, 1.7vw, 30px) * var(--qscale));
    }
    .qpanel .qopt-key {
      flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center;
      width: 1.7em; height: 1.7em; border-radius: 12px;
      background: var(--gold); color: #6b4a06; font-weight: 800;
    }
    /* Đáp án đúng khi Master bật "hiện đáp án" */
    .qpanel .qopt.correct {
      background: var(--green-soft); border-color: var(--green); box-shadow: 0 5px 0 #a4ddc2; color: #2f8a5f;
    }
    .qpanel .qopt.correct .qopt-key { background: var(--green); color: #fff; }
    .qpanel .qopt-mark { margin-left: auto; color: var(--green); }
    .qpanel .qanswer {
      align-self: flex-start; max-width: 100%; background: var(--green-soft); border: 2px solid var(--green);
      border-radius: 14px; box-shadow: 0 4px 0 #a4ddc2; padding: 10px 18px; color: #2f8a5f;
    }
    .qpanel .qanswer-label { font-weight: 800; margin-bottom: .15em; }
    .qpanel .qanswer-label i { color: var(--green); }
    .qpanel .qanswer-body { font-weight: 700; font-size: calc(clamp(16px, 1.8vw, 30px) * var(--qscale)); }
    .qpanel .qanswer-body p { margin: 0 0 .25em; }
    .qpanel .qanswer-body p:last-child { margin-bottom: 0; }
    .qpanel .qanswer-body ul, .qpanel .qanswer-body ol { margin: .1em 0 .1em 1.1em; padding: 0; }
    .qpanel .qanswer-body li { margin: .12em 0; }
    /* Cột người chơi: giữ style card, thu nhỏ kích thước cho vừa */
    #stage.qmode .pcard { min-height: clamp(90px, 8vw, 130px); padding: clamp(10px, 1vw, 18px); }
    #stage.qmode .pcard .pav {
      width: clamp(46px, 4.4vw, 76px); height: clamp(46px, 4.4vw, 76px); font-size: clamp(24px, 2.6vw, 42px);
    }
    #stage.qmode .pcard .pname { font-size: clamp(16px, 1.5vw, 26px); }
    #stage.qmode .pcard .ptime { font-size: clamp(15px, 1.6vw, 26px); padding: 3px 10px; }
    #stage.qmode .pcard .pstate { font-size: clamp(13px, 1.1vw, 18px); }
    #stage.qmode .pcard .rank { font-size: clamp(22px, 2vw, 34px); top: -12px; left: -8px; }
    /* Thẻ người chơi: style giống nút bấm — nền màu đặc + bóng đáy 3D */
    .pcard {
      background: var(--blue-soft); border: 3px solid #bcd6f2; border-radius: 22px;
      padding: clamp(14px, 1.4vw, 26px); position: relative;
      box-shadow: 0 7px 0 #b7d1ee;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      min-height: clamp(120px, 12vw, 180px); text-align: center;
      justify-content: center;
      will-change: transform;   /* mượt cho hoạt ảnh FLIP */
    }
    .pcard .pav {
      width: clamp(64px, 6.4vw, 116px); height: clamp(64px, 6.4vw, 116px);
      font-size: clamp(36px, 3.8vw, 66px); margin-bottom: 4px;
      /* bóng 3D lớn hơn cho avatar to, theo sắc tối của màu nền */
      box-shadow: 0 6px 0 rgba(0, 0, 0, .22);
      box-shadow: 0 6px 0 color-mix(in srgb, var(--av, #000) 68%, #000);
    }
    .pcard .rank {
      position: absolute; top: -14px; left: -10px;
      font-size: clamp(28px, 2.8vw, 46px); line-height: 1;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,.2));
    }
    .pcard .rank.gold { color: #f4b73f; }
    .pcard .rank.silver { color: #a9b4c4; }
    .pcard .rank.bronze { color: #cd7f4b; }
    .pcard .pname {
      font-weight: 700; font-size: clamp(22px, 2.6vw, 44px); color: var(--ink);
      max-width: 100%; line-height: 1.12; text-align: center;
      overflow-wrap: break-word; word-break: break-word;   /* tên dài tự xuống dòng, không tràn card */
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .pcard .ptime {
      font-family: "Shantell Sans", sans-serif; font-weight: 800; font-size: clamp(26px, 3vw, 50px);
      line-height: 1; color: var(--ink);
      /* nền dạng card + bóng đáy; bóng dùng chính màu viền của card */
      background: var(--paper); border: 2px solid #efe7d3; border-radius: 14px;
      padding: clamp(4px, .5vw, 9px) clamp(12px, 1.3vw, 22px);
      box-shadow: 0 4px 0 #bcd6f2; max-width: 100%; margin-top: 4px;
    }
    /* Nền chip theo hạng; bóng đáy dùng màu viền của card */
    .pcard.win .ptime {
      background: var(--gold-soft); color: #6b4a06;
      border-color: #f0cd78; box-shadow: 0 5px 0 #6b4a06;
    }
    .pcard.buzzed .ptime {
      background: var(--green-soft); color: #2f8a5f;
      border-color: #b6e6cf; box-shadow: 0 5px 0 #2f8a5f;
    }
    .pcard .pstate { font-size: clamp(16px, 1.6vw, 26px); color: var(--ink-soft); font-weight: 600; }

    /* Trạng thái — mỗi trạng thái một màu nút riêng */
    .pcard.buzzed { background: var(--green); border-color: var(--green); box-shadow: 0 7px 0 #52b082; }
    .pcard.buzzed .pname { color: #fff; }
    .pcard.buzzed .pstate { color: rgba(255, 255, 255, .85); }
    .pcard.win {
      border-color: var(--gold);
      background: var(--gold);          /* fill đặc phẳng giống nút gold */
      box-shadow: 0 9px 0 #d99a1f;      /* cùng tông bóng với nút .mini */
      transform: scale(1.03);
    }
    .pcard.win .pname { color: #6b4a06; }
    .pcard.off {
      opacity: .6; border-style: dashed;
      background: #f4ede0; border-color: #e4dcc9; box-shadow: 0 5px 0 #e4dcc9;
    }
    .pcard.off .pstate { color: var(--red); }

    .vempty { text-align: center; font-size: clamp(20px, 2.5vw, 36px); color: var(--ink-soft); margin-top: 12vh; }

    /* Popup đáp án đúng + pháo hoa */
    .answer-modal {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(20, 40, 30, .55); -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
      animation: fadeIn .25s ease-out both;
    }
    .answer-modal.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fw-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .answer-card {
      position: relative; z-index: 1; text-align: center; max-width: 90vw; max-height: 86vh; overflow-y: auto;
      background: var(--paper); border: 4px solid var(--gold); border-radius: 30px;
      box-shadow: 0 12px 0 #d99a1f; padding: clamp(24px, 4vw, 56px) clamp(32px, 7vw, 90px);
      animation: answerPop .5s cubic-bezier(.2, .8, .2, 1.2) both;
    }
    .answer-label {
      font-family: "Shantell Sans", sans-serif; font-weight: 700; color: #2f8a5f;
      font-size: clamp(22px, 3vw, 46px);
    }
    .answer-label i { color: var(--green); }
    .answer-value {
      font-family: "Shantell Sans", sans-serif; font-weight: 800; color: var(--ink);
      font-size: clamp(30px, 5.5vw, 80px); line-height: 1.12; margin-top: 10px; word-break: break-word;
    }
    .answer-value code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .8em; background: var(--blue-soft); padding: .05em .3em; border-radius: 10px; }
    .answer-value a { color: var(--blue); }
    /* Đáp án nhiều dòng / danh sách trong modal */
    .answer-value .md { font-size: clamp(20px, 3vw, 44px); text-align: left; }
    .answer-value .md p { margin: 0 0 .2em; }
    .answer-value .md p:last-child { margin-bottom: 0; }
    .answer-value .md ul, .answer-value .md ol { margin: .2em 0 .2em 1.1em; padding: 0; }
    .answer-value .md li { margin: .12em 0; }
    .answer-value del { opacity: .55; }
    @keyframes answerPop { 0% { opacity: 0; transform: scale(.6); } 60% { transform: scale(1.06); } 100% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <button id="fsBtn" class="fs-btn" title="Toàn màn hình" aria-label="Toàn màn hình"><i class="fa-solid fa-expand"></i></button>
  <script>
    (function () {
      var b = document.getElementById("fsBtn");
      b.onclick = function () {
        if (document.fullscreenElement) { if (document.exitFullscreen) document.exitFullscreen(); }
        else if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(function () {});
      };
      document.addEventListener("fullscreenchange", function () {
        var on = !!document.fullscreenElement;
        b.title = on ? "Thoát toàn màn hình" : "Toàn màn hình";
        b.classList.toggle("on", on);
      });
    })();
  </script>

  <!-- Nhập mã (fallback) -->
  <div class="card" id="enter">
    <h1 class="underline"><i class="fa-solid fa-tv"></i> Màn chiếu</h1>
    <p class="sub">Nhập mã phòng để mở màn chiếu cho khán giả.</p>
    <label>Mã phòng</label>
    <input id="codeInput" placeholder="ABCD" maxlength="4" autocapitalize="characters"
           style="text-transform:uppercase;letter-spacing:6px;font-weight:700;text-align:center;font-size:24px;" />
    <button id="enterBtn"><i class="fa-solid fa-tv"></i> Mở màn chiếu</button>
    <div class="msg" id="enterMsg"></div>
  </div>

  <!-- Màn chiếu -->
  <div id="stage">
    <div class="vhead" id="vhead">
      <div class="vtimer" id="vtimer"></div>
      <div class="vbanner wait" id="banner"><i class="fa-regular fa-hourglass-half"></i> Chờ hiệu lệnh…</div>
    </div>
    <div class="qwrap" id="qwrap">
      <div class="qleft">
        <div class="qhead" id="qhead">
          <!-- status (banner/timer) được chuyển vào đây khi ở layout đề -->
          <select id="qFont" class="qfont-select" title="Cỡ chữ đề bài">
            <option value="0.75">Cỡ chữ · Nhỏ</option>
            <option value="0.9" selected>Cỡ chữ · Vừa</option>
            <option value="1.1">Cỡ chữ · Lớn</option>
            <option value="1.35">Cỡ chữ · Rất lớn</option>
          </select>
        </div>
        <div class="qpanel" id="qpanel"></div>
      </div>
      <div class="qresizer" id="qresizer" title="Kéo để đổi kích thước hai vùng"></div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="vempty hidden" id="empty">Chưa có thí sinh nào tham gia…</div>
  </div>

  <!-- Popup đáp án đúng + pháo hoa -->
  <div class="answer-modal hidden" id="answerModal">
    <canvas class="fw-canvas" id="fireworks"></canvas>
    <div class="answer-card">
      <div class="answer-label"><i class="fa-solid fa-circle-check"></i> Đáp án đúng</div>
      <div class="answer-value" id="answerValue"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const $ = (id) => document.getElementById(id);

    // ---- Đồng hồ thời gian đã trôi qua (từ lúc ra hiệu) ----
    let elapsedTimer = null, elapsedStart = 0, vPrevPhase = null;
    function fmtElapsed(ms) {
      const s = ms / 1000;
      if (s < 60) return s.toFixed(1) + "s";
      return Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");
    }
    function startElapsed() {
      elapsedStart = performance.now();
      clearInterval(elapsedTimer);
      const tick = () => { $("vtimer").innerHTML = '<i class="fa-solid fa-stopwatch"></i> ' + fmtElapsed(performance.now() - elapsedStart); };
      tick();
      elapsedTimer = setInterval(tick, 100);
      $("vtimer").style.display = "block";
    }
    function stopElapsed(hide) {
      clearInterval(elapsedTimer); elapsedTimer = null;
      if (hide) $("vtimer").style.display = "none";
    }

    $("codeInput").addEventListener("input", (e) => { e.target.value = e.target.value.toUpperCase(); });
    $("enterBtn").onclick = go;
    $("codeInput").addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });

    const preCode = new URLSearchParams(location.search).get("code");
    if (preCode) { $("codeInput").value = preCode.toUpperCase().slice(0, 4); go(); }

    function go() {
      const code = $("codeInput").value.trim().toUpperCase();
      if (!code) { $("enterMsg").textContent = "Nhập mã phòng."; return; }
      socket.emit("viewer:join", { code }, (res) => {
        if (!res?.ok) { $("enterMsg").textContent = res?.error || "Không vào được phòng."; return; }
        document.body.classList.add("live");
        render(res.phase, res.players);
        applyQuestion(res.question, res.reveal);
      });
    }

    socket.on("room:update", ({ phase, players }) => {
      if (document.body.classList.contains("live")) render(phase, players);
    });
    socket.on("room:closed", () => {
      $("banner").className = "vbanner result";
      $("banner").innerHTML = '<i class="fa-solid fa-door-open"></i> Phòng đã đóng';
      $("grid").innerHTML = "";
      cardEls.clear(); // đồng bộ map node để không dựng lại thẻ cũ
      stopElapsed(true);
      applyQuestion(null); // thoát layout đề bài
    });

    // Giữ node theo id để tái sử dụng -> cho phép hoạt ảnh FLIP khi đổi vị trí
    const cardEls = new Map();

    // Đổ nội dung + class cho 1 thẻ theo trạng thái người chơi
    function updateCard(el, p, rank, phase) {
      const isWin = rank === 1;
      let cls = "pcard";
      let medal = "", body = "";
      if (p.disabled) {
        cls += " off";
        body = '<div class="pstate"><i class="fa-solid fa-lock"></i> Đã khóa</div>';
      } else if (p.buzzed) {
        cls += isWin ? " win" : " buzzed";
        if (rank <= 3) {
          const mc = rank === 1 ? "gold" : rank === 2 ? "silver" : "bronze";
          medal = `<div class="rank ${mc}"><i class="fa-solid fa-medal"></i></div>`;
        }
        body = `<div class="ptime" title="${p.reaction} ms">${secs(p.reaction)}</div>` +
               (rank > 3 ? `<div class="pstate">Hạng ${rank}</div>` : "");
      } else {
        body = `<div class="pstate">${phase === "SIGNAL" ? "…đang chờ bấm" : "sẵn sàng"}</div>`;
      }
      const name = escapeHtml(p.name);
      const av = p.avatar ? `<span class="avatar pav" style="--av:${p.avatar.color};background:${p.avatar.color}">${p.avatar.emoji}</span>` : "";
      el.className = cls;
      el.innerHTML = `${medal}${av}<div class="pname">${name}</div>${body}`;
    }

    function render(phase, players) {
      // Đồng hồ: chạy khi vào SIGNAL, dừng (giữ số cuối) khi công bố kết quả
      if (phase === "SIGNAL" && vPrevPhase !== "SIGNAL") startElapsed();
      else if (phase !== "SIGNAL" && vPrevPhase === "SIGNAL") stopElapsed(false);
      vPrevPhase = phase;

      // Xếp hạng: người đã bấm & không bị khóa, theo thời gian tăng dần
      const ranked = players.filter((p) => p.buzzed && !p.disabled).sort((a, b) => a.reaction - b.reaction);
      const rankOf = new Map(ranked.map((p, i) => [p.id, i + 1]));

      // Banner
      const b = $("banner");
      if (phase === "SIGNAL") { b.className = "vbanner signal"; b.innerHTML = '<i class="fa-solid fa-bolt"></i> BẤM NHANH!'; }
      else if (ranked.length) { b.className = "vbanner result"; b.innerHTML = '<i class="fa-solid fa-trophy"></i> KẾT QUẢ'; }
      else { b.className = "vbanner wait"; b.innerHTML = '<i class="fa-regular fa-hourglass-half"></i> Chờ hiệu lệnh…'; }

      // Sắp xếp thẻ: đã bấm (theo hạng) -> đang chờ -> bị khóa
      const order = [...players].sort((a, b) => {
        const ra = rankOf.get(a.id) || (a.disabled ? 9999 : 999);
        const rb = rankOf.get(b.id) || (b.disabled ? 9999 : 999);
        return ra - rb;
      });

      $("empty").classList.toggle("hidden", players.length > 0);
      const grid = $("grid");

      // FLIP · FIRST: ghi lại vị trí hiện tại của các thẻ đang có
      const firstRects = new Map();
      cardEls.forEach((el, id) => firstRects.set(id, el.getBoundingClientRect()));

      // Cập nhật/tạo thẻ theo thứ tự mới
      const seen = new Set();
      const ordered = [];
      for (const p of order) {
        seen.add(p.id);
        let el = cardEls.get(p.id);
        const isNew = !el;
        if (isNew) { el = document.createElement("div"); cardEls.set(p.id, el); }
        updateCard(el, p, rankOf.get(p.id), phase);
        ordered.push({ el, id: p.id, isNew });
      }
      // Bỏ thẻ của người đã rời phòng
      cardEls.forEach((el, id) => { if (!seen.has(id)) { el.remove(); cardEls.delete(id); } });

      // FLIP · LAST: gắn lại theo thứ tự mới (di chuyển node, KHÔNG tạo lại)
      ordered.forEach((o) => grid.appendChild(o.el));

      // FLIP · INVERT + PLAY
      ordered.forEach(({ el, id, isNew }) => {
        if (isNew) {
          el.animate(
            [{ opacity: 0, transform: "scale(.8)" }, { opacity: 1, transform: "scale(1)" }],
            { duration: 300, easing: "cubic-bezier(.2,.7,.2,1)" }
          );
          return;
        }
        const f = firstRects.get(id);
        const l = el.getBoundingClientRect();
        const dx = f.left - l.left, dy = f.top - l.top;
        if (dx || dy) {
          el.animate(
            [{ transform: `translate(${dx}px, ${dy}px)` }, { transform: "translate(0, 0)" }],
            { duration: 480, easing: "cubic-bezier(.2,.7,.2,1)" }
          );
        }
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    // Hiển thị theo giây (2 số lẻ); hover ra ms qua thuộc tính title.
    function secs(ms) { return (ms / 1000).toFixed(2) + " s"; }

    // ---- Popup đáp án đúng + pháo hoa ----
    let fwRAF = null, fwTimer = null, fwParticles = [];
    function fwResize() {
      const c = $("fireworks");
      c.width = c.clientWidth; c.height = c.clientHeight;
    }
    function launchFirework() {
      const c = $("fireworks");
      const x = Math.random() * c.width;
      const y = c.height * (0.18 + Math.random() * 0.42);
      const hue = Math.floor(Math.random() * 360);
      const n = 44;
      for (let i = 0; i < n; i++) {
        const ang = (Math.PI * 2 * i) / n + Math.random() * 0.2;
        const sp = 2 + Math.random() * 4.5;
        fwParticles.push({ x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, life: 1, hue });
      }
    }
    function fwLoop() {
      const c = $("fireworks"), ctx = c.getContext("2d");
      ctx.clearRect(0, 0, c.width, c.height);
      for (const p of fwParticles) {
        p.x += p.vx; p.y += p.vy; p.vy += 0.045; p.vx *= 0.99; p.vy *= 0.99; p.life -= 0.011;
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.fillStyle = `hsl(${p.hue}, 90%, 60%)`;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3.2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      fwParticles = fwParticles.filter((p) => p.life > 0);
      fwRAF = requestAnimationFrame(fwLoop);
    }
    function startFireworks() {
      fwResize();
      if (!fwRAF) fwLoop();
      launchFirework();
      clearInterval(fwTimer);
      fwTimer = setInterval(launchFirework, 650);
    }
    function stopFireworks() {
      clearInterval(fwTimer); fwTimer = null;
      cancelAnimationFrame(fwRAF); fwRAF = null;
      fwParticles = [];
      const c = $("fireworks"); if (c) c.getContext("2d").clearRect(0, 0, c.width, c.height);
    }
    function showAnswerModal(html) {
      const wasHidden = $("answerModal").classList.contains("hidden");
      $("answerValue").innerHTML = html;   // đã render markdown -> dùng innerHTML
      $("answerModal").classList.remove("hidden");
      if (wasHidden) startFireworks(); // chỉ bắn pháo hoa khi lần đầu mở
    }
    function hideAnswerModal() {
      if ($("answerModal").classList.contains("hidden")) return;
      $("answerModal").classList.add("hidden");
      stopFireworks();
    }
    window.addEventListener("resize", () => { if (!$("answerModal").classList.contains("hidden")) fwResize(); });
    // ESC: ẩn modal đáp án + đồng bộ ngược lại Master (tắt reveal)
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" && !$("answerModal").classList.contains("hidden")) {
        hideAnswerModal();
        socket.emit("viewer:hideAnswer");
      }
    });

    // ---- Markdown nhỏ gọn, an toàn (escape HTML trước rồi mới format) ----
    function mdInline(s) {
      return s
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/__([^_]+)__/g, "<strong>$1</strong>")
        .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>")
        .replace(/(^|[^_])_([^_\n]+)_/g, "$1<em>$2</em>")
        .replace(/~~([^~]+)~~/g, "<del>$1</del>")
        .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    }
    function escMd(s) {
      return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    }
    function mdInlineSafe(s) { return mdInline(escMd(s)); }
    function mdToHtml(md) {
      const lines = escMd(md).split(/\r?\n/);
      let html = "", listType = null, inCode = false, codeBuf = [], para = [], quote = [];
      const closeList = () => { if (listType) { html += `</${listType}>`; listType = null; } };
      const flushPara = () => { if (para.length) { html += `<p>${mdInline(para.join(" "))}</p>`; para = []; } };
      const flushQuote = () => { if (quote.length) { html += `<blockquote>${mdInline(quote.join("<br>"))}</blockquote>`; quote = []; } };
      const flushText = () => { flushPara(); flushQuote(); };
      for (const line of lines) {
        if (/^```/.test(line.trim())) {
          if (inCode) { html += `<pre><code>${codeBuf.join("\n")}</code></pre>`; codeBuf = []; inCode = false; }
          else { flushText(); closeList(); inCode = true; }
          continue;
        }
        if (inCode) { codeBuf.push(line); continue; }
        const bq = line.match(/^\s*&gt;\s?(.*)$/);   // '>' đã bị escMd đổi thành '&gt;'
        if (bq) { flushPara(); closeList(); quote.push(bq[1]); continue; }
        const h = line.match(/^(#{1,6})\s+(.*)$/);
        if (h) { flushText(); closeList(); html += `<h${h[1].length}>${mdInline(h[2])}</h${h[1].length}>`; continue; }
        const ul = line.match(/^\s*[-*+]\s+(.*)$/);
        if (ul) { flushText(); if (listType !== "ul") { closeList(); html += "<ul>"; listType = "ul"; } html += `<li>${mdInline(ul[1])}</li>`; continue; }
        const ol = line.match(/^\s*\d+\.\s+(.*)$/);
        if (ol) { flushText(); if (listType !== "ol") { closeList(); html += "<ol>"; listType = "ol"; } html += `<li>${mdInline(ol[1])}</li>`; continue; }
        if (line.trim() === "") { flushText(); closeList(); continue; }
        flushQuote(); closeList(); para.push(line.trim());
      }
      if (inCode) html += `<pre><code>${codeBuf.join("\n")}</code></pre>`;
      flushText(); closeList();
      return html;
    }

    // ---- Đề bài: layout đề trái + người chơi phải ----
    function renderQPanel(q, reveal) {
      const text = q.q ? `<div class="qtext md">${mdToHtml(q.q)}</div>` : "";
      const img = q.img ? `<img class="qimg" src="${escapeHtml(q.img)}" alt="Ảnh đề bài" />` : "";
      const showIdx = reveal && typeof q.answer === "number";
      const opts = (q.options || []).map((o, i) => {
        const ok = showIdx && i === q.answer;   // đáp án đúng -> tô xanh
        return `<li class="qopt${ok ? " correct" : ""}"><span class="qopt-key">${String.fromCharCode(65 + i)}</span><span>${mdInlineSafe(o)}</span>${ok ? '<i class="fa-solid fa-circle-check qopt-mark"></i>' : ""}</li>`;
      }).join("");
      // Đáp án dạng chữ (đề không có options) -> hiện ô đáp án (render markdown block)
      const textAns = reveal && typeof q.answer === "string" && q.answer
        ? `<div class="qanswer"><div class="qanswer-label"><i class="fa-solid fa-circle-check"></i> Đáp án</div><div class="qanswer-body md">${mdToHtml(q.answer)}</div></div>` : "";
      $("qpanel").innerHTML = text + img + (opts ? `<ul class="qopts">${opts}</ul>` : "") + textAns;

      // Popup + pháo hoa hiển thị đáp án đúng (render markdown)
      let ansHtml = "";
      if (reveal) {
        if (typeof q.answer === "number" && q.options && q.options[q.answer] !== undefined)
          ansHtml = String.fromCharCode(65 + q.answer) + ". " + mdInlineSafe(q.options[q.answer]);
        else if (typeof q.answer === "string" && q.answer) ansHtml = `<div class="md">${mdToHtml(q.answer)}</div>`;
      }
      if (ansHtml) showAnswerModal(ansHtml); else hideAnswerModal();
    }
    function applyQuestion(q, reveal) {
      const on = !!(q && (q.q || q.img));
      $("stage").classList.toggle("qmode", on);
      if (on) {
        renderQPanel(q, reveal);
        // Chuyển status (banner) + đồng hồ vào đầu vùng đề — status trước, timer sau
        const qhead = $("qhead");
        qhead.insertBefore($("vtimer"), qhead.firstChild);
        qhead.insertBefore($("banner"), qhead.firstChild);
      } else {
        // Trả về header trên cùng khi thoát layout đề
        hideAnswerModal();
        $("vhead").appendChild($("vtimer"));
        $("vhead").appendChild($("banner"));
      }
    }
    socket.on("room:question", ({ question, reveal }) => applyQuestion(question, reveal));

    // Dropdown cỡ chữ đề bài (ghi nhớ lựa chọn)
    function setQFont(v) {
      $("qpanel").style.setProperty("--qscale", v);
      try { localStorage.setItem("rcv-qfont", v); } catch {}
    }
    (function initQFont() {
      try { const s = localStorage.getItem("rcv-qfont"); if (s) $("qFont").value = s; } catch {}
      setQFont($("qFont").value);
      $("qFont").addEventListener("change", (e) => setQFont(e.target.value));
    })();

    // Thanh kéo đổi kích thước vùng đề / vùng người chơi (ghi nhớ)
    (function initResizer() {
      const wrap = $("qwrap"), rz = $("qresizer");
      const apply = (pct) => wrap.style.setProperty("--qsplit", pct + "%");
      try { const s = localStorage.getItem("rcv-qsplit"); if (s) apply(parseFloat(s)); } catch {}
      let dragging = false;
      rz.addEventListener("pointerdown", (e) => { dragging = true; rz.setPointerCapture(e.pointerId); e.preventDefault(); });
      rz.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const rect = wrap.getBoundingClientRect();
        let pct = ((e.clientX - rect.left) / rect.width) * 100;
        pct = Math.max(30, Math.min(80, pct));
        apply(pct);
        try { localStorage.setItem("rcv-qsplit", pct.toFixed(1)); } catch {}
      });
      const end = (e) => { if (dragging) { dragging = false; try { rz.releasePointerCapture(e.pointerId); } catch {} } };
      rz.addEventListener("pointerup", end);
      rz.addEventListener("pointercancel", end);
    })();
  </script>
