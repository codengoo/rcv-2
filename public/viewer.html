<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf7ec" />
  <title>📺 Rung chuông vàng - Màn chiếu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <!-- PWA: mở full màn hình khi thêm vào MH chính (iPhone/iPad + Android) -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Màn chiếu · RCV" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    body { display: block; padding: 0; align-items: stretch; justify-content: flex-start; }

    /* Màn nhập mã (khi mở trực tiếp không có ?code) */
    #enter { max-width: 460px; margin: 8vh auto; padding: 16px; }

    /* Màn chiếu */
    #stage { display: none; min-height: 100vh; padding: 2.2vw 2.6vw; }
    body.live #stage { display: block; }
    body.live #enter { display: none; }

    .vhead {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 16px; margin-bottom: 1.6vw; flex-wrap: wrap; padding-right: 58px;
    }
    .vtitle { font-family: "Shantell Sans", sans-serif; font-weight: 700; font-size: clamp(30px, 4vw, 60px); color: var(--ink); }
    .vbanner {
      font-family: "Shantell Sans", sans-serif; font-weight: 700; font-size: clamp(22px, 3vw, 44px);
      padding: 8px 24px; border-radius: 999px; white-space: nowrap;
    }
    .vbanner.wait { background: var(--blue-soft); color: var(--ink); }
    .vbanner.signal { background: var(--green); color: #073b23; animation: bpulse 1s ease-in-out infinite; }
    .vbanner.result { background: var(--gold); color: #6b4a06; }
    @keyframes bpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .grid {
      display: grid;
      /* rộng hơn để chứa đủ tên tối đa 20 ký tự */
      grid-template-columns: repeat(auto-fill, minmax(clamp(240px, 23vw, 360px), 1fr));
      gap: clamp(12px, 1.4vw, 24px);
    }
    /* Thẻ người chơi: style giống nút bấm — nền màu đặc + bóng đáy 3D */
    .pcard {
      background: var(--blue-soft); border: 3px solid #bcd6f2; border-radius: 22px;
      padding: clamp(14px, 1.4vw, 26px); position: relative;
      box-shadow: 0 7px 0 #b7d1ee;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      min-height: clamp(120px, 12vw, 180px); text-align: center;
      justify-content: center;
      will-change: transform;   /* mượt cho hoạt ảnh FLIP */
    }
    .pcard .pav {
      width: clamp(64px, 6.4vw, 116px); height: clamp(64px, 6.4vw, 116px);
      font-size: clamp(36px, 3.8vw, 66px); margin-bottom: 4px;
    }
    .pcard .rank {
      position: absolute; top: -14px; left: -10px;
      font-size: clamp(30px, 3vw, 52px); line-height: 1;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,.15));
    }
    .pcard .pname {
      font-weight: 700; font-size: clamp(22px, 2.6vw, 44px); color: var(--ink);
      max-width: 100%; line-height: 1.12; text-align: center;
      overflow-wrap: break-word; word-break: break-word;   /* tên dài tự xuống dòng, không tràn card */
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .pcard .ptime {
      font-family: "Shantell Sans", sans-serif; font-weight: 800; font-size: clamp(30px, 3.6vw, 60px);
      line-height: 1; color: var(--ink-soft);
    }
    .pcard .pstate { font-size: clamp(16px, 1.6vw, 26px); color: var(--ink-soft); font-weight: 600; }

    /* Trạng thái — mỗi trạng thái một màu nút riêng */
    .pcard.buzzed { background: var(--green); border-color: var(--green); box-shadow: 0 7px 0 #52b082; }
    .pcard.buzzed .pname, .pcard.buzzed .ptime { color: #fff; }
    .pcard.buzzed .pstate { color: rgba(255, 255, 255, .85); }
    .pcard.win {
      border-color: var(--gold);
      background: var(--gold);          /* fill đặc phẳng giống nút gold */
      box-shadow: 0 9px 0 #d99a1f;      /* cùng tông bóng với nút .mini */
      transform: scale(1.03);
    }
    .pcard.win .pname, .pcard.win .ptime { color: #6b4a06; }
    .pcard.off {
      opacity: .6; border-style: dashed;
      background: #f4ede0; border-color: #e4dcc9; box-shadow: 0 5px 0 #e4dcc9;
    }
    .pcard.off .pstate { color: var(--red); }

    .vempty { text-align: center; font-size: clamp(20px, 2.5vw, 36px); color: var(--ink-soft); margin-top: 12vh; }
  </style>
</head>
<body>
  <button id="fsBtn" class="fs-btn" title="Toàn màn hình" aria-label="Toàn màn hình">⛶</button>
  <script>
    (function () {
      var b = document.getElementById("fsBtn");
      b.onclick = function () {
        if (document.fullscreenElement) { if (document.exitFullscreen) document.exitFullscreen(); }
        else if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(function () {});
      };
      document.addEventListener("fullscreenchange", function () {
        var on = !!document.fullscreenElement;
        b.title = on ? "Thoát toàn màn hình" : "Toàn màn hình";
        b.classList.toggle("on", on);
      });
    })();
  </script>

  <!-- Nhập mã (fallback) -->
  <div class="card" id="enter">
    <h1 class="underline">📺 Màn chiếu</h1>
    <p class="sub">Nhập mã phòng để mở màn chiếu cho khán giả.</p>
    <label>Mã phòng</label>
    <input id="codeInput" placeholder="ABCD" maxlength="4" autocapitalize="characters"
           style="text-transform:uppercase;letter-spacing:6px;font-weight:700;text-align:center;font-size:24px;" />
    <button id="enterBtn">Mở màn chiếu 📺</button>
    <div class="msg" id="enterMsg"></div>
  </div>

  <!-- Màn chiếu -->
  <div id="stage">
    <div class="vhead">
      <div class="vbanner wait" id="banner">⏳ Chờ hiệu lệnh…</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="vempty hidden" id="empty">Chưa có thí sinh nào tham gia…</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const $ = (id) => document.getElementById(id);

    $("codeInput").addEventListener("input", (e) => { e.target.value = e.target.value.toUpperCase(); });
    $("enterBtn").onclick = go;
    $("codeInput").addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });

    const preCode = new URLSearchParams(location.search).get("code");
    if (preCode) { $("codeInput").value = preCode.toUpperCase().slice(0, 4); go(); }

    function go() {
      const code = $("codeInput").value.trim().toUpperCase();
      if (!code) { $("enterMsg").textContent = "Nhập mã phòng."; return; }
      socket.emit("viewer:join", { code }, (res) => {
        if (!res?.ok) { $("enterMsg").textContent = res?.error || "Không vào được phòng."; return; }
        document.body.classList.add("live");
        render(res.phase, res.players);
      });
    }

    socket.on("room:update", ({ phase, players }) => {
      if (document.body.classList.contains("live")) render(phase, players);
    });
    socket.on("room:closed", () => {
      $("banner").className = "vbanner result";
      $("banner").textContent = "🚪 Phòng đã đóng";
      $("grid").innerHTML = "";
      cardEls.clear(); // đồng bộ map node để không dựng lại thẻ cũ
    });

    // Giữ node theo id để tái sử dụng -> cho phép hoạt ảnh FLIP khi đổi vị trí
    const cardEls = new Map();

    // Đổ nội dung + class cho 1 thẻ theo trạng thái người chơi
    function updateCard(el, p, rank, phase) {
      const isWin = rank === 1;
      let cls = "pcard";
      let medal = "", body = "";
      if (p.disabled) {
        cls += " off";
        body = '<div class="pstate">🔒 Đã khóa</div>';
      } else if (p.buzzed) {
        cls += isWin ? " win" : " buzzed";
        medal = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : "";
        body = `<div class="ptime" title="${p.reaction} ms">${secs(p.reaction)}</div>` +
               (rank > 3 ? `<div class="pstate">Hạng ${rank}</div>` : "");
      } else {
        body = `<div class="pstate">${phase === "SIGNAL" ? "…đang chờ bấm" : "sẵn sàng"}</div>`;
      }
      const name = (isWin ? "👑 " : "") + escapeHtml(p.name);
      const av = p.avatar ? `<span class="avatar pav" style="background:${p.avatar.color}">${p.avatar.emoji}</span>` : "";
      el.className = cls;
      el.innerHTML = `${medal ? `<div class="rank">${medal}</div>` : ""}${av}<div class="pname">${name}</div>${body}`;
    }

    function render(phase, players) {
      // Xếp hạng: người đã bấm & không bị khóa, theo thời gian tăng dần
      const ranked = players.filter((p) => p.buzzed && !p.disabled).sort((a, b) => a.reaction - b.reaction);
      const rankOf = new Map(ranked.map((p, i) => [p.id, i + 1]));

      // Banner
      const b = $("banner");
      if (phase === "SIGNAL") { b.className = "vbanner signal"; b.textContent = "🟢 BẤM NHANH!"; }
      else if (ranked.length) { b.className = "vbanner result"; b.textContent = "🏆 KẾT QUẢ"; }
      else { b.className = "vbanner wait"; b.textContent = "⏳ Chờ hiệu lệnh…"; }

      // Sắp xếp thẻ: đã bấm (theo hạng) -> đang chờ -> bị khóa
      const order = [...players].sort((a, b) => {
        const ra = rankOf.get(a.id) || (a.disabled ? 9999 : 999);
        const rb = rankOf.get(b.id) || (b.disabled ? 9999 : 999);
        return ra - rb;
      });

      $("empty").classList.toggle("hidden", players.length > 0);
      const grid = $("grid");

      // FLIP · FIRST: ghi lại vị trí hiện tại của các thẻ đang có
      const firstRects = new Map();
      cardEls.forEach((el, id) => firstRects.set(id, el.getBoundingClientRect()));

      // Cập nhật/tạo thẻ theo thứ tự mới
      const seen = new Set();
      const ordered = [];
      for (const p of order) {
        seen.add(p.id);
        let el = cardEls.get(p.id);
        const isNew = !el;
        if (isNew) { el = document.createElement("div"); cardEls.set(p.id, el); }
        updateCard(el, p, rankOf.get(p.id), phase);
        ordered.push({ el, id: p.id, isNew });
      }
      // Bỏ thẻ của người đã rời phòng
      cardEls.forEach((el, id) => { if (!seen.has(id)) { el.remove(); cardEls.delete(id); } });

      // FLIP · LAST: gắn lại theo thứ tự mới (di chuyển node, KHÔNG tạo lại)
      ordered.forEach((o) => grid.appendChild(o.el));

      // FLIP · INVERT + PLAY
      ordered.forEach(({ el, id, isNew }) => {
        if (isNew) {
          el.animate(
            [{ opacity: 0, transform: "scale(.8)" }, { opacity: 1, transform: "scale(1)" }],
            { duration: 300, easing: "cubic-bezier(.2,.7,.2,1)" }
          );
          return;
        }
        const f = firstRects.get(id);
        const l = el.getBoundingClientRect();
        const dx = f.left - l.left, dy = f.top - l.top;
        if (dx || dy) {
          el.animate(
            [{ transform: `translate(${dx}px, ${dy}px)` }, { transform: "translate(0, 0)" }],
            { duration: 480, easing: "cubic-bezier(.2,.7,.2,1)" }
          );
        }
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    // Hiển thị theo giây (2 số lẻ); hover ra ms qua thuộc tính title.
    function secs(ms) { return (ms / 1000).toFixed(2) + " s"; }
  </script>
</body>
</html>
