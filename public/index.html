<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>🔔 Rung chuông vàng</title>
  <meta name="theme-color" content="#fbf7ec" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ===== Client tối ưu cho MOBILE ===== */
    html, body { height: 100%; }
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }

    /* --- Màn join --- */
    #joinCard { padding: 28px 22px; }
    #joinCard input { padding: 15px 16px; font-size: 17px; }
    #joinCard #codeInput { font-size: 26px; text-align: center; padding: 16px; }
    #joinCard button { padding: 17px; font-size: 20px; }

    /* --- Màn chơi: full màn hình --- */
    body.playing { padding: 0; align-items: stretch; }
    body.playing .wrap { max-width: 100%; }
    body.playing #gameCard {
      height: 100dvh;
      border: none; border-radius: 0; box-shadow: none;
      background: transparent;
      display: flex; flex-direction: column;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
      gap: 10px;
      overflow-y: auto;
    }
    /* Đèn/nút bấm chiếm phần lớn màn hình */
    #gameCard .stage {
      flex: 1 1 auto;
      height: auto; min-height: 46vh;
      border-radius: 28px;
      font-size: clamp(22px, 7vw, 34px);
      -webkit-user-select: none; user-select: none;
      touch-action: manipulation;
      box-shadow: 0 10px 26px rgba(90,121,168,.16);
    }
    #gameCard .stage .big { font-size: clamp(64px, 24vw, 150px); line-height: 1; }
    #gameCard .stage.signal { box-shadow: 0 0 0 5px rgba(111,199,154,.25), 0 12px 30px rgba(79,181,135,.35); }
    #gameCard .stage.signal:active { transform: scale(.97); }
    .bell { font-size: clamp(56px, 20vw, 120px); line-height: 1; }
    .done-icon { font-size: clamp(52px, 16vw, 100px); line-height: 1; }
    .done-ms {
      font-family: "Shantell Sans", sans-serif; font-weight: 800;
      font-size: clamp(46px, 15vw, 96px); line-height: 1.05;
      white-space: nowrap; margin-top: 6px;
    }
    .tap-hint { font-size: clamp(15px, 4.5vw, 20px); font-weight: 600; opacity: .85; margin-top: 4px; }

    .msg { margin-top: 4px; }
    #resultBox { flex: 0 0 auto; }

    /* --- Bảng xếp hạng kết quả: đồng bộ style nút (fill đặc + bóng đáy 3D) --- */
    #resultBox .result-card { border-color: var(--gold); }
    #resultBox .players { margin-top: 12px; }
    #resultBox .players li {
      border: none; color: #fff; font-weight: 700;
      background: var(--green); box-shadow: 0 4px 0 #52b082;
    }
    #resultBox .players li.gold {          /* hạng nhất: vàng như nút gold */
      color: #6b4a06; background: var(--gold); box-shadow: 0 4px 0 #d99a1f;
    }

    /* --- Stage: đồng bộ style nút (fill đặc phẳng + bóng đáy 3D, bỏ gradient/nét đứt) --- */
    #gameCard .stage { border-style: solid; box-shadow: 0 10px 0 #e0e4ee; }
    #gameCard .stage.wait   { background: var(--blue-soft); border-color: #bcd6f2; box-shadow: 0 10px 0 #bcd6f2; }
    #gameCard .stage.signal { background: var(--green); border-color: #4fb587; color: #0d5236; box-shadow: 0 12px 0 #4fb587; }
    #gameCard .stage.done   { background: var(--gold-soft); border-color: var(--gold); color: #a9740b; box-shadow: 0 10px 0 #eaca7f; }
    #gameCard .stage.foul   { background: var(--red-soft); border-color: var(--red); color: #c8544c; box-shadow: 0 10px 0 #f2b3ad; }
    /* Ô signal là nút bấm khổng lồ -> lún xuống khi chạm */
    #gameCard .stage.signal:active { transform: translateY(6px); box-shadow: 0 6px 0 #4fb587; }
  </style>
</head>
<body>
  <button id="fsBtn" class="fs-btn" title="Toàn màn hình" aria-label="Toàn màn hình">⛶</button>
  <script>
    (function () {
      var b = document.getElementById("fsBtn");
      b.onclick = function () {
        if (document.fullscreenElement) { if (document.exitFullscreen) document.exitFullscreen(); }
        else if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(function () {});
      };
      document.addEventListener("fullscreenchange", function () {
        var on = !!document.fullscreenElement;
        b.title = on ? "Thoát toàn màn hình" : "Toàn màn hình";
        b.classList.toggle("on", on);
      });
    })();
  </script>
  <div class="wrap">
    <!-- Màn join -->
    <div class="card" id="joinCard">
      <h1 class="underline">🔔 Rung chuông vàng</h1>
      <p class="sub">Nhập mã phòng và tên để tham gia. Ai bấm nhanh nhất sau tín hiệu sẽ thắng! 🏆</p>
      <label>Mã phòng</label>
      <input id="codeInput" placeholder="ABCD" maxlength="4" autocapitalize="characters" autocomplete="off"
             inputmode="latin" style="text-transform:uppercase;letter-spacing:6px;font-weight:700;" />
      <label>Tên của bạn</label>
      <input id="nameInput" placeholder="Tên hiển thị" maxlength="20" autocomplete="off" />
      <button id="joinBtn">Tham gia 🚀</button>
      <div class="msg" id="joinMsg"></div>
      <div class="status">Là người điều khiển? → <a href="/master.html">Mở bàn Master</a></div>
    </div>

    <!-- Màn chơi -->
    <div class="card hidden" id="gameCard">
      <div class="stage wait" id="stage">
        <div id="stageText"></div>
      </div>

      <div class="msg" id="gameMsg"></div>
      <div id="resultBox"></div>
      <div class="status" id="playersStatus"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const $ = (id) => document.getElementById(id);

    let phase = "LOBBY";
    let signalPerf = null;   // mốc thời gian LOCAL khi nhận tín hiệu
    let hasActed = false;    // đã bấm trong vòng này
    let myName = "";
    let myAvatar = null;     // avatar con vật kiểu Kahoot
    let iDisabled = false;   // bị Master khóa quyền chơi

    const vibrate = (p) => { try { navigator.vibrate && navigator.vibrate(p); } catch {} };

    // ---- Join ----
    $("codeInput").addEventListener("input", (e) => { e.target.value = e.target.value.toUpperCase(); });
    $("joinBtn").onclick = doJoin;
    $("codeInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("nameInput").focus(); });
    $("nameInput").addEventListener("keydown", (e) => { if (e.key === "Enter") doJoin(); });

    // Quét QR -> điền sẵn mã phòng, con trỏ nhảy vào ô tên
    const preCode = new URLSearchParams(location.search).get("code");
    if (preCode) {
      $("codeInput").value = preCode.toUpperCase().slice(0, 4);
      setTimeout(() => $("nameInput").focus(), 100);
    }

    function doJoin() {
      const code = $("codeInput").value.trim().toUpperCase();
      const name = $("nameInput").value.trim();
      if (!code || !name) { $("joinMsg").textContent = "Nhập đủ mã phòng và tên."; return; }
      socket.emit("client:join", { code, name }, (res) => {
        if (!res?.ok) { $("joinMsg").textContent = res?.error || "Không vào được phòng."; return; }
        myName = name;
        myAvatar = res.avatar || null;
        document.body.classList.add("playing");
        $("joinCard").classList.add("hidden");
        $("gameCard").classList.remove("hidden");
        showWait();
      });
    }

    // ---- Buzz ----
    const stage = $("stage");
    stage.addEventListener("pointerdown", buzz);
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" && !$("gameCard").classList.contains("hidden")) { e.preventDefault(); buzz(); }
    });

    function buzz() {
      if (hasActed || phase !== "SIGNAL" || iDisabled) return;
      const reaction = Math.round(performance.now() - signalPerf);
      hasActed = true;
      vibrate(35);
      socket.emit("client:buzz", { reaction });
      stage.className = "stage done";
      $("stageText").innerHTML = `<div class="done-icon">⚡</div><div class="done-ms" title="${reaction} ms">${secs(reaction)}</div>`;
      $("gameMsg").textContent = "Đã bấm! Chờ kết quả…";
    }

    function setStage(cls, big, msg) {
      stage.className = "stage " + cls;
      $("stageText").innerHTML = big ? `<span class="big">${big}</span>` : "";
      $("gameMsg").textContent = msg || "";
    }
    function showWait() {
      if (iDisabled) return showLocked();
      stage.className = "stage wait";
      const icon = myAvatar
        ? `<span class="avatar" style="width:clamp(90px,28vw,160px);height:clamp(90px,28vw,160px);background:${myAvatar.color};font-size:clamp(52px,17vw,96px)">${myAvatar.emoji}</span>`
        : `<div class="bell">🔔</div>`;
      $("stageText").innerHTML = `${icon}<div class="tap-hint" style="margin-top:10px">${escapeHtml(myName)} · chờ hiệu lệnh…</div>`;
      $("gameMsg").textContent = "";
    }
    function showLocked() {
      stage.className = "stage foul";
      $("stageText").innerHTML = `<div class="bell">🔒</div><div class="tap-hint">Bạn đã bị tạm khóa quyền chơi</div>`;
      $("gameMsg").textContent = "";
    }

    // ---- Sự kiện từ server ----
    socket.on("game:signal", () => {
      signalPerf = performance.now();      // đo LOCAL từ lúc màn hình hiện tín hiệu
      phase = "SIGNAL"; hasActed = false;
      $("resultBox").innerHTML = "";
      if (iDisabled) return showLocked();  // bị khóa thì không hiện nút bấm
      vibrate([0, 60]);
      setStage("signal", "BẤM!", "");
      stage.querySelector("#stageText").insertAdjacentHTML("beforeend", '<div class="tap-hint">Chạm nhanh vào đây!</div>');
    });

    socket.on("player:disabled", ({ disabled }) => {
      iDisabled = disabled;
      if (disabled) { hasActed = true; showLocked(); }
      else { hasActed = false; showWait(); }
    });

    socket.on("game:results", ({ winner, ranking }) => {
      phase = "LOBBY";
      const iWon = winner && winner.name === myName;
      if (iWon) vibrate([0, 40, 60, 40]);
      let head;
      if (iWon) head = '<div style="text-align:center;font-size:24px;">🏆 <b class="rank1">Bạn thắng!</b></div>';
      else if (winner) head = `<div style="text-align:center;font-size:18px;">🏆 Người thắng: <b>${escapeHtml(winner.name)}</b> (<span title="${winner.reaction} ms">${secs(winner.reaction)}</span>)</div>`;
      else head = '<div style="text-align:center;">Vòng này không ai hợp lệ 😅</div>';
      let list = ranking.length ? '<ul class="players">' + ranking.map((r) =>
        `<li class="${r.rank === 1 ? "gold" : ""}"><span>${r.rank === 1 ? "🥇" : r.rank === 2 ? "🥈" : r.rank === 3 ? "🥉" : r.rank + "."} ${escapeHtml(r.name)}</span><span title="${r.reaction} ms">${secs(r.reaction)}</span></li>`
      ).join("") + "</ul>" : "";
      $("resultBox").innerHTML = '<div class="card result-card" style="margin-top:12px;">' + head + list + "</div>";
      if (!hasActed) setStage("wait", "", "");
    });

    socket.on("game:reset", () => {
      phase = "LOBBY"; hasActed = false; signalPerf = null;
      $("resultBox").innerHTML = "";
      showWait();
    });

    socket.on("room:update", ({ phase: p, players }) => {
      const done = players.filter((x) => x.buzzed).length;
      $("playersStatus").textContent = `${players.length} người chơi · ${done} đã bấm`;
    });

    socket.on("room:closed", () => {
      setStage("foul", "", "Phòng đã đóng (Master rời đi).");
      $("stageText").innerHTML = '<div class="bell">🚪</div>';
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    // Hiển thị theo giây (2 số lẻ); hover ra ms qua thuộc tính title.
    function secs(ms) { return (ms / 1000).toFixed(2) + " s"; }
  </script>
</body>
</html>
